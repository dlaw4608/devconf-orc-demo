apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: psi-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/dlaw4608/devconf-orc-demo.git
    targetRevision: main
    path: environments/psi

  destination:
    server: https://kubernetes.default.svc
    namespace: psi

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
